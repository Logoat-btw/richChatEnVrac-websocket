### CONFIGURATIONS DE LA SECURITE ###
# Sécurité CORS et CSRF
app.security.cors-dev=true
# METTRE SUR FALSE LE CSRF POUR LE DEV !
app.security.csrf=false 
app.security.local-admin=rvenant
# Gestion de cookies de session
server.servlet.session.cookie.name=RICHCHATSESSIONID
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=false
server.servlet.session.cookie.domain=localhost
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.max-age=1h

# Gestion des sessions
server.servlet.session.timeout=1h

### CONFIGURATION DU COMPORTEMENT DU SERVEUR HTTP ###
# Configuration du cache de ressources coté client
# n'importe quel client peut stocker en cache une réponse
spring.web.resources.cache.cachecontrol.cache-public=true
# une réponse peut être cachée au plus 1h (3600 sec)
spring.web.resources.cache.cachecontrol.max-age=3600
# quand une rép. est "vieille", elle doit être revalidée
spring.web.resources.cache.cachecontrol.must-revalidate=true

### CONFIGURATION DE LA JOURNALISATION ###
