### CONFIGURATION GENERALE ###
spring.application.name=Rich Chat Server
server.port=8080
# propriété suivante à activer si l'application est lancée derrière un reverse proxy et dont le chemin d'accès n'est pas la racine du domaine
#server.forward-headers-strategy=FRAMEWORK
#profiles d'intérêt: development, sample-data
spring.profiles.active=development, sample-data

spring.web.resources.static-locations=file:/var/www/rich-chat

### CONFIGURATION POUR LE DEVELOPPEMENT ###
# propriétés suivantes à activer en production
# spring.devtools.add-properties=false
# spring.devtools.restart.enabled=false
# En dev, exclusion des fichier static pour éviter le redémarrage auto
spring.devtools.restart.exclude=static/**,public/**,developmentEnv/**

### CONFIGURATION ACCES DB ###
spring.data.mongodb.database=richchat-db
spring.data.mongodb.auto-index-creation=true
#spring.data.mongodb.host=127.0.0.1
#spring.data.mongodb.authentication-database=admin
